<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Register | Gymnastics & Acrobatics Training Center</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
</head>
<body>

    <div class="floating-controls">
        <button class="control-btn" id="theme-toggle" aria-label="Toggle Dark Mode">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
        <button class="control-btn" id="rtl-toggle" aria-label="Toggle RTL">RTL</button>
    </div>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-logo" style="text-align: center; display: flex; justify-content: center; margin-bottom: 8px;">
                <a href="index.html" style="text-decoration: none;">
                    <div class="nav-brand">
                        <svg class="brand-icon" width="32" height="32" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-right: 10px;">
                            <path d="M10 30C10 30 16 14 20 14C24 14 30 30 30 30" stroke="var(--primary-accent)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                            <circle cx="20" cy="6" r="5" fill="var(--secondary-accent)"/>
                            <path d="M5 22L15 17M35 22L25 17" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                        </svg>
                        <span style="display: inline-flex; align-items: center; letter-spacing: -0.02em; font-weight: 700;">Acro<span style="color: var(--primary-accent);">Gym</span></span>
                    </div>
                </a>
            </div>
            
            <h3 style="text-align: center; margin-bottom: 24px; font-size: 24px;">Parent Registration</h3>



            <form action="dashboard.html">
                <div class="form-group">
                    <label class="form-label" for="fullName">Full Name</label>
                    <input type="text" id="fullName" class="form-control" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="password" class="form-control" placeholder="Create a strong password" required>
                        <button type="button" class="password-toggle" aria-label="Toggle password visibility">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </button>
                    </div>
                </div>

                <div class="auth-actions" style="justify-content: flex-start;">
                    <label class="checkbox-wrapper">
                        <input type="checkbox" required>
                        <span>I agree to the <a href="#">Terms & Conditions</a></span>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Create Account</button>
            </form>

            <div class="auth-divider" style="margin-top: 28px;">or continue with</div>

            <div class="social-login">
                <button type="button" class="btn btn-social btn-block">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google">
                    Sign up with Google
                </button>
                <button type="button" class="btn btn-social btn-block">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" alt="Apple" style="filter: var(--apple-logo-filter, none);">
                    Sign up with Apple
                </button>
            </div>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Sign In</a>
            </div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script>
        // Adjust Apple logo for dark mode
        const observer = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                if (mutation.attributeName === 'data-theme') {
                    const theme = document.documentElement.getAttribute('data-theme');
                    const appleLogo = document.querySelector('img[alt="Apple"]');
                    if (appleLogo) {
                        appleLogo.style.filter = theme === 'dark' ? 'invert(1)' : 'none';
                    }
                }
            });
        });
        observer.observe(document.documentElement, { attributes: true });
        
        // Initial check
        if (document.documentElement.getAttribute('data-theme') === 'dark') {
            const appleLogo = document.querySelector('img[alt="Apple"]');
            if(appleLogo) appleLogo.style.filter = 'invert(1)';
        }
    </script>
</body>
</html>
